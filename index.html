<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'none'">

  <title>Digi Browser</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="app-container" class="rounded-2xl flex flex-col h-screen bg-[var(--bg)]">

    <!-- ─── Toolbar ─── -->
    <div class="h-auto flex items-center px-1 py-1 gap-2 [-webkit-app-region:drag] z-50">

      <div class="flex flex-2 gap-2 [-webkit-app-region:no-drag]">

        <!-- ─── Logo ─── -->
        <div class="flex items-center justify-between pl-2 [-webkit-app-region:no-drag] w-40">

          <img src="assets/icon-digi.svg" class="w-5 h-5">

          <button id="toggle-sidebar-btn"
            class="flex items-center justify-center bg-transparent w-7 h-7 rounded-xl transition-all duration-200 hover:bg-[#868686]/10 cursor-pointer"
            title="Toggle Sidebar">

            <img id="toggle-sidebar-icon" src="assets/icon-close-side.svg"
              class="w-5 h-5 grayscale opacity-80 transition-all duration-200 hover:grayscale-0 hover:opacity-100 transition-transform duration-300">

          </button>

        </div>

        <button id="back-btn"
          class="bg-transparent border-none text-[#868686] w-7 h-7 rounded-xl flex items-center justify-center cursor-pointer transition-all duration-200 hover:bg-[#868686]/10 hover:text-[#F83B66]"
          title="Back">

          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none">
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>

        </button>

        <button id="forward-btn"
          class="bg-transparent border-none text-[#868686] w-7 h-7 rounded-xl flex items-center justify-center cursor-pointer transition-all duration-200 hover:bg-[#868686]/10 hover:text-[#F83B66]"
          title="Forward">

          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none">
            <path d="M5 12h14M12 5l7 7-7 7" />
          </svg>

        </button>

        <button id="reload-btn"
          class="bg-transparent border-none text-[#868686] w-7 h-7 rounded-xl flex items-center justify-center cursor-pointer transition-all duration-200 hover:bg-[#868686]/10 hover:text-[#F83B66]"
          title="Reload">

          <svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" stroke-width="2.5" fill="none">
            <path d="M23 4v6h-6M1 20v-6h6" />
            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" />
          </svg>

        </button>

      </div>

      <div class="flex-1 max-w-3xl mx-auto flex items-center justify-center [-webkit-app-region:no-drag]">

        <div class="flex items-center gap-1">

          <!--copylink-->
          <button id="copylink-btn"
            class="text-slate-400 w-7 h-7 rounded-xl flex items-center justify-center cursor-pointer transition-all duration-200 hover:bg-[#868686]/10 group"
            title="Copy link">

            <img src="assets/icon-link.svg" class="w-5 h-5 grayscale-100 group-hover:grayscale-0">

          </button>

          <!-- Address bar -->
          <div
            class="address-bar-wrapper rounded-xl py-1 px-2 mx-auto flex justify-center items-center bg-[#ffffff]/60 hover:bg-[#ffffff]/90 focus-within:border-[#36252D]/50 focus-within:ring-1 focus-within:ring-[#868686] w-[320px] overflow-hidden relative">

            <span class="lock-icon text-[#36252D] opacity-60 mr-1 flex-shrink-0" id="security-icon"
              title="Connection is secure">

              <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2.5" fill="none">

                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0110 0v4" />

              </svg>

            </span>

            <input type="text" id="address-input" placeholder="Search or enter URL" spellcheck="false"
              autocomplete="off"
              class="bg-transparent text-xs font-light border-none outline-none text-[#1d1d1d] placeholder-[#868686] placeholder:font-light transition-all duration-100 min-w-[10px]"
              style="width: 140px;" />

            <span id="text-measurer"
              class="absolute invisible whitespace-pre text-xs font-light opacity-0 pointer-events-none">
            </span>

          </div>

          <!-- Menu -->
          <button id="menu-btn"
            class="text-[#868686] w-7 h-7 rounded-xl flex items-center justify-center cursor-pointer transition-all duration-200 hover:bg-[#868686]/10 hover:text-[#F83B66]"
            title="Menu">

            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">

              <circle cx="12" cy="5" r="1.5" fill="currentColor" stroke="none" />
              <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none" />
              <circle cx="12" cy="19" r="1.5" fill="currentColor" stroke="none" />

            </svg>

          </button>

        </div>

      </div>

      <!-- ─── Custom Window Controls ─── -->
      <div class="flex flex-2 items-center justify-end gap-2 [-webkit-app-region:no-drag]">

        <button id="split-view-btn"
          class="w-7 h-7 rounded-xl flex items-center justify-center text-[#868686] hover:bg-[#868686]/10 hover:text-[#F83B66] transition-all cursor-pointer"
          title="Split view">

          <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.3" fill="none">
            <rect x="3" y="4" width="18" height="16" rx="2" />
            <path d="M12 4v16" />
          </svg>

        </button>

        <button id="min-btn"
          class="w-7 h-7 rounded-xl flex items-center justify-center text-[#868686] hover:bg-[#07CB7D]/90 hover:text-white transition-all cursor-pointer">

          <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none">
            <path d="M5 12h14" />
          </svg>

        </button>

        <button id="max-btn"
          class="w-7 h-7 rounded-xl flex items-center justify-center text-[#868686] hover:bg-[#0A77F3]/90 hover:text-white transition-all cursor-pointer">

          <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2.5" fill="none">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
          </svg>

        </button>

        <button id="close-btn"
          class="w-7 h-7 rounded-xl flex items-center justify-center text-[#868686] hover:bg-[#FF242C]/90 hover:text-white transition-all cursor-pointer">

          <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>

        </button>

      </div>

    </div>

    <div class="flex flex-1 overflow-hidden bg-[var(--bg)] rounded-2xl relative">

      <!-- Hover zone -->
      <div id="sidebar-hover-zone" class="absolute left-0 top-0 w-1 h-full z-50 hidden cursor-ew-resize">
      </div>

      <!-- ─── Sidebar ─── -->
      <div id="sidebar"
        class="h-full flex flex-col pt-1 pb-2 gap-2 [-webkit-app-region:drag] overflow-hidden transition-all duration-300 ease-in-out w-[165px]">

        <div id="favorites-container" class="flex flex-col w-full gap-1 border-2 shrink-0 [-webkit-app-region:no-drag]"></div>

        <div id="tabs-container" class="flex flex-col w-full gap-1 [-webkit-app-region:no-drag]"></div>

        <button id="new-tab-btn"
          class="bg-transparent flex shrink-0 mb-2 border border-dashed border-[#868686]/40 text-[#868686] w-full h-7 rounded-xl p-1 px-1
          flex items-center justify-center cursor-pointer transition-all duration-300 hover:bg-[#ffffff] hover:text-[#F83B66] hover:border-[#F83B66]/40 active:scale-95 [-webkit-app-region:no-drag]"
          title="New Tab">

          <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none">

            <path d="M12 5v14M5 12h14" />

          </svg>

          <span class="ml-2 text-xs font-medium">
            New Tab
          </span>

        </button>

      </div>

      <!-- BrowserView -->
      <div class="flex-1 pr-1 pb-1 bg-[var(--bg)] flex flex-col" id="webviews-container">
      </div>

    </div>

  </div>

  <script src="renderer.js"></script>
</body>

</html>
